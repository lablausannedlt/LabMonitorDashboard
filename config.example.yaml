# =============================================================================
# LabMonitor — shared configuration template
# Copy to config.yaml and fill in real values.
# config.yaml is gitignored — never commit it.
# =============================================================================

# =============================================================================
# TSP01B Logger (tsp01_logger.py)
# =============================================================================
sensor:
  # VISA resource string for the TSP01B.
  # To find it: python tsp01_logger.py --list-devices
  visa_resource: "<serial_number_string>"

  # VISA query timeout in milliseconds
  timeout_ms: 5000


influxdb:
  # InfluxDB 2.x server URL
  url: "http://localhost:8086"

  # API token — create in InfluxDB UI: Data → API Tokens → Generate
  token: "<your-influxdb-api-token>"

  # Organisation name (top-left of the InfluxDB UI)
  org: "Deeplight"

  # Bucket to write into (create in InfluxDB UI: Data → Buckets)
  bucket: "LabEnvironment"

  # InfluxDB measurement name used by tsp01_logger (like a table name)
  measurement: "tsp01"

  # Static tags added to every TSP01 data point
  tags:
    location: "lab"
    sensor_id: "tsp01_1"


acquisition:
  # How often to read the TSP01 sensor (seconds)
  interval_seconds: 10

  # How long to wait before retrying after a read error (seconds)
  retry_delay_seconds: 30

  # How many consecutive errors before the daemon exits
  max_consecutive_errors: 5


# =============================================================================
# OpenWeatherMap Logger (owm_logger.py)
# =============================================================================
openweathermap:
  # Free API key from https://openweathermap.org/api
  api_key: "<your-openweathermap-api-key>"

  # City ID — 2659994 = Lausanne, Switzerland
  # Find other city IDs at: https://openweathermap.org/find
  city_id: 2659994

  # Units: metric (°C), imperial (°F), or standard (K)
  units: "metric"

  # Polling interval in seconds (600 = 10 minutes)
  interval_seconds: 600


# =============================================================================
# STM32 IKS01A3 Logger (stm32_logger.py)
# =============================================================================
stm32:
  # Serial port of the NUCLEO-F401RE (ST-Link virtual COM port)
  # Windows: COM3, COM4, ...   Find in Device Manager → Ports (COM & LPT)
  # Linux:   /dev/ttyACM0, /dev/ttyUSB0, ...
  port: "COM3"

  # Baud rate — must match the DataLogTerminal firmware (default 115200)
  baud: 115200

  # Seconds to wait before retrying after a serial disconnect
  retry_delay_seconds: 5

  # Collect this many seconds of serial data before sending one batch write
  batch_seconds: 1.0

  # Exit after this many consecutive InfluxDB write failures
  max_consecutive_errors: 5

  # Optional static tags added to every point (environment + imu measurements)
  tags:
    location: "lab"
    sensor_id: "stm32_1"
